name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        python: ['3.12', '3.13', '3.14']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: ${{ matrix.python }}

      - run: uv sync --group dev

      - run: uv run ruff check

      - run: uv run ruff format --check

  check-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.first-publish.outputs.is_first_publish == 'true' || steps.version.outputs.local_version_is_higher }}
    steps:
      - uses: actions/checkout@v7

      - name: Check if package exists on PyPI
        id: first-publish
        run: |
          name=$(grep -m1 '^name' pyproject.toml | sed -E 's/name\s*=\s*"([^"]+)"/\1/')
          status=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/${name}/json")
          if [ "$status" = "404" ]; then
            echo "is_first_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_first_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if version needs publishing
        id: version
        if: steps.first-publish.outputs.is_first_publish != 'true'
        uses: maybe-hello-world/pyproject-check-version@cb964e82b3c8a0b1cedb117da63e1761c46600b8  # v4
        with:
          pyproject-path: pyproject.toml

  publish:
    needs: [lint, check-version]
    if: needs.check-version.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.0

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
